<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Trading Academy</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg0:#070d1a;--bg1:#0f1829;--bg2:#162035;--bg3:#1c2a45;
  --t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
  --grn:#10b981;--red:#ef4444;--blu:#3b82f6;--yel:#f59e0b;
  --pur:#8b5cf6;--cyn:#06b6d4;--bdr:#1e2d45;
  --cg:#26a69a;--cr:#ef5350;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t1);font-family:'Segoe UI',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:270px;min-width:270px;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
#sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--bdr)}
#sb-head h1{font-size:17px;font-weight:800;background:linear-gradient(90deg,var(--blu),var(--cyn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#sb-head p{font-size:11px;color:var(--t3);margin-top:3px}
#sb-prog{padding:10px 16px 12px;border-bottom:1px solid var(--bdr)}
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:5px}
.pbar-wrap{background:var(--bg3);border-radius:4px;height:5px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--blu),var(--cyn));border-radius:4px;transition:width .5s ease}
#mod-list{overflow-y:auto;flex:1;padding:6px 0}
.mi{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .2s}
.mi:hover{background:var(--bg2)}
.mi.active{background:var(--bg2);border-left-color:var(--blu)}
.mi.done{border-left-color:var(--grn)}
.mi.locked{opacity:.4;pointer-events:none}
.mi-icon{font-size:16px;width:22px;text-align:center}
.mi-info{flex:1;min-width:0}
.mi-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-sub{font-size:10px;color:var(--t3);margin-top:2px}
.mi-badge{font-size:12px}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--bg1);border-bottom:1px solid var(--bdr);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
#topbar-left h2{font-size:15px;font-weight:700}
#topbar-left p{font-size:11px;color:var(--t3);margin-top:2px}
#topbar-right{display:flex;align-items:center;gap:10px}
.tbtn{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--bdr);border-radius:18px;padding:5px 11px;cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);transition:all .2s}
.tbtn:hover{border-color:var(--yel);color:var(--yel)}
.tbtn.on{background:rgba(245,158,11,.1);border-color:var(--yel);color:var(--yel)}
#slide-info{font-size:11px;color:var(--t3)}

/* ── SLIDE AREA ── */
#slide-area{flex:1;overflow-y:auto;padding:22px}
.slide{max-width:920px;margin:0 auto;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.slide-title{font-size:26px;font-weight:800;margin-bottom:5px;background:linear-gradient(135deg,var(--t1),var(--blu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.slide-sub{font-size:13px;color:var(--t2);margin-bottom:18px}

/* ELI10 */
.eli10{background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(245,158,11,.03));border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:13px 16px;margin-bottom:16px;display:none}
.eli10.show{display:block}
.eli10 .lbl{font-size:10px;font-weight:700;color:var(--yel);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.eli10 p{font-size:13px;color:var(--t1);line-height:1.6}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g-cr{display:grid;grid-template-columns:1fr 1.5fr;gap:16px}
.g-cl{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.gcol{display:flex;flex-direction:column;gap:14px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:16px}
.card h3{font-size:13px;font-weight:700;color:var(--blu);margin-bottom:10px}
.card.grn h3{color:var(--grn)}
.card.red h3{color:var(--red)}
.card.yel h3{color:var(--yel)}
.card.pur h3{color:var(--pur)}
.card.cyn h3{color:var(--cyn)}
.card p{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:8px}
.card p:last-child{margin-bottom:0}
.card ul{list-style:none;padding:0}
.card ul li{font-size:12px;color:var(--t2);padding:4px 0 4px 14px;position:relative;line-height:1.5}
.card ul li::before{content:'▸';position:absolute;left:0;color:var(--blu)}
.card ul li.g::before{color:var(--grn)}
.card ul li.r::before{color:var(--red)}
.card ul li.y::before{color:var(--yel)}
.card ul li.p::before{color:var(--pur)}
.card ul li strong{color:var(--t1)}

/* TERM CARDS */
.terms-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.tc{background:var(--bg0);border:1px solid var(--bdr);border-radius:8px;padding:12px;text-align:center}
.tc .tv{font-size:22px;font-weight:800;margin-bottom:3px}
.tc .tn{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px}
.tc .td{font-size:10px;color:var(--t3);line-height:1.4}
.c-grn{color:var(--grn)}.c-red{color:var(--red)}.c-blu{color:var(--blu)}.c-yel{color:var(--yel)}.c-pur{color:var(--pur)}.c-cyn{color:var(--cyn)}

/* INFO BOXES */
.ibox{background:var(--bg2);border-radius:8px;padding:13px;border-left:3px solid var(--blu)}
.ibox.g{border-left-color:var(--grn)}.ibox.r{border-left-color:var(--red)}.ibox.y{border-left-color:var(--yel)}.ibox.p{border-left-color:var(--pur)}
.ibox h4{font-size:12px;font-weight:700;color:var(--blu);margin-bottom:5px}
.ibox.g h4{color:var(--grn)}.ibox.r h4{color:var(--red)}.ibox.y h4{color:var(--yel)}.ibox.p h4{color:var(--pur)}
.ibox p{font-size:12px;color:var(--t2);line-height:1.5}

/* FORMULA */
.formula{background:var(--bg0);border:1px solid var(--blu);border-radius:7px;padding:10px 16px;font-family:'Courier New',monospace;font-size:13px;color:var(--cyn);text-align:center;margin:8px 0}

/* CHART WRAP */
.cwrap{background:var(--bg0);border:1px solid var(--bdr);border-radius:8px;padding:10px;position:relative}
.cwrap canvas{display:block;width:100%!important}
.clabel{font-size:10px;color:var(--t3);text-align:center;margin-top:6px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg0);color:var(--t3);text-transform:uppercase;font-size:10px;letter-spacing:.8px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--bdr)}
td{padding:8px 10px;border-bottom:1px solid var(--bdr);color:var(--t2);vertical-align:top}
tr:hover td{background:var(--bg2)}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.tag-g{background:rgba(16,185,129,.15);color:var(--grn)}
.tag-r{background:rgba(239,68,68,.15);color:var(--red)}
.tag-b{background:rgba(59,130,246,.15);color:var(--blu)}
.tag-y{background:rgba(245,158,11,.15);color:var(--yel)}
.tag-p{background:rgba(139,92,246,.15);color:var(--pur)}

/* BOTTOM NAV */
#botnav{background:var(--bg1);border-top:1px solid var(--bdr);padding:13px 22px;display:flex;align-items:center;justify-content:space-between}
.nbtn{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--bdr);border-radius:7px;padding:9px 18px;cursor:pointer;font-size:12px;font-weight:700;color:var(--t2);transition:all .2s}
.nbtn:hover:not(:disabled){background:var(--bg3);border-color:var(--blu);color:var(--t1)}
.nbtn:disabled{opacity:.3;cursor:not-allowed}
.nbtn.primary{background:var(--blu);border-color:var(--blu);color:#fff}
.nbtn.primary:hover{background:#2563eb}
.nbtn.quiz{background:rgba(139,92,246,.12);border-color:var(--pur);color:var(--pur)}
.dots{display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bdr);cursor:pointer;transition:all .2s}
.dot.on{background:var(--blu);width:18px;border-radius:4px}
.dot.done{background:var(--grn)}

/* QUIZ OVERLAY */
#qoverlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:999}
#qoverlay.open{display:flex}
#qbox{background:var(--bg1);border:1px solid var(--bdr);border-radius:14px;padding:28px;max-width:580px;width:92%;max-height:82vh;overflow-y:auto}
#qbox h2{font-size:18px;font-weight:800;margin-bottom:5px}
.q-meta{font-size:11px;color:var(--t3);margin-bottom:20px}
.qq{margin-bottom:20px}
.qq .qt{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:10px;line-height:1.5}
.qopt{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:var(--bg2);border:1px solid var(--bdr);border-radius:7px;margin-bottom:7px;cursor:pointer;transition:all .2s;font-size:12px;color:var(--t2)}
.qopt:hover{border-color:var(--blu);color:var(--t1)}
.qopt.sel{border-color:var(--blu);background:rgba(59,130,246,.08);color:var(--t1)}
.qopt.correct{border-color:var(--grn);background:rgba(16,185,129,.08);color:var(--grn)}
.qopt.wrong{border-color:var(--red);background:rgba(239,68,68,.08);color:var(--red)}
.qopt .ql{font-weight:700;font-size:11px;width:18px;height:18px;border-radius:50%;background:var(--bg0);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.q-explain{font-size:11px;color:var(--t3);margin-top:6px;padding:8px;background:var(--bg0);border-radius:6px;display:none}
.q-explain.show{display:block}
#qactions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;border-top:1px solid var(--bdr);padding-top:16px}
.qbtn{padding:9px 20px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.qbtn.p{background:var(--blu);border:none;color:#fff}.qbtn.p:hover{background:#2563eb}
.qbtn.s{background:var(--bg2);border:1px solid var(--bdr);color:var(--t2)}.qbtn.s:hover{border-color:var(--t2);color:var(--t1)}
#qresult{text-align:center;padding:16px 0}
.score-ring{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 14px;border:4px solid var(--grn)}
.score-ring.fail{border-color:var(--yel)}
.snum{font-size:26px;font-weight:800;color:var(--grn)}
.score-ring.fail .snum{color:var(--yel)}
.slbl{font-size:10px;color:var(--t3)}
#qresult h3{font-size:18px;font-weight:700;margin-bottom:7px}
#qresult p{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:14px}

/* PINE SCRIPT BLOCK */
.pine{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:16px;overflow-x:auto}
.pine pre{font-family:'Courier New',monospace;font-size:11px;line-height:1.7;color:#e6edf3}
.pine .c{color:#8b949e}.pine .k{color:#ff7b72}.pine .f{color:#d2a8ff}.pine .s{color:#a5d6ff}.pine .n{color:#79c0ff}.pine .v{color:#ffa657}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* MISC */
hr.div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(59,130,246,.12);color:var(--blu);border:1px solid rgba(59,130,246,.25);margin:2px}
.chip.g{background:rgba(16,185,129,.12);color:var(--grn);border-color:rgba(16,185,129,.25)}
.chip.r{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.25)}
.chip.y{background:rgba(245,158,11,.12);color:var(--yel);border-color:rgba(245,158,11,.25)}
.chip.p{background:rgba(139,92,246,.12);color:var(--pur);border-color:rgba(139,92,246,.25)}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sb-head">
    <h1>📈 Day Trading Academy</h1>
    <p>From zero to live trades — step by step</p>
  </div>
  <div id="sb-prog">
    <div class="prog-row"><span>Overall Progress</span><span id="pct-lbl">0%</span></div>
    <div class="pbar-wrap"><div class="pbar-fill" id="main-pbar" style="width:0%"></div></div>
  </div>
  <div id="mod-list"><!-- JS renders --></div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div id="topbar-left">
      <h2 id="mod-title">Welcome</h2>
      <p id="mod-sub"></p>
    </div>
    <div id="topbar-right">
      <span id="slide-info">1 / 1</span>
      <button class="tbtn" id="eli10-btn" onclick="toggleEli10()">🧒 ELI10</button>
    </div>
  </div>

  <div id="slide-area"><!-- JS renders --></div>

  <div id="botnav">
    <button class="nbtn" id="prev-btn" onclick="nav(-1)" disabled>← Prev</button>
    <div class="dots" id="dots"></div>
    <button class="nbtn primary" id="next-btn" onclick="nav(1)">Next →</button>
  </div>
</div>

<!-- QUIZ OVERLAY -->
<div id="qoverlay">
  <div id="qbox">
    <h2 id="q-title">Module Quiz</h2>
    <div class="q-meta" id="q-meta"></div>
    <div id="q-body"></div>
    <div id="qactions"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CHART ENGINE
═══════════════════════════════════════════════ */
function rndCandles(n, start=100, vol=0.018, seed=42) {
  let p = start, rng = seed;
  function rand() { rng = (rng*1664525+1013904223)&0xffffffff; return (rng>>>0)/0xffffffff; }
  return Array.from({length:n}, (_,i) => {
    const bias = Math.sin(i*0.15)*0.003;
    const chg = (rand()-0.49+bias)*vol*p;
    const o=p, c=p+chg;
    const h=Math.max(o,c)+rand()*vol*p*0.4;
    const l=Math.min(o,c)-rand()*vol*p*0.4;
    p=c;
    return {o,h,l,c,v:Math.floor(rand()*800000+200000)};
  });
}

function calcSMA(candles, period) {
  return candles.map((_,i) => {
    if(i<period-1) return null;
    return candles.slice(i-period+1,i+1).reduce((s,c)=>s+c.c,0)/period;
  });
}

function calcEMA(candles, period) {
  const k=2/(period+1);
  const out=[];
  let ema=null;
  for(let c of candles) {
    ema = ema===null ? c.c : c.c*k+ema*(1-k);
    out.push(ema);
  }
  return out;
}

function calcRSI(candles, period=14) {
  const out=Array(period).fill(null);
  let ag=0,al=0;
  for(let i=1;i<=period;i++){
    const d=candles[i].c-candles[i-1].c;
    if(d>0)ag+=d; else al-=d;
  }
  ag/=period; al/=period;
  out.push(al===0?100:100-100/(1+ag/al));
  for(let i=period+1;i<candles.length;i++){
    const d=candles[i].c-candles[i-1].c;
    const g=d>0?d:0, l=d<0?-d:0;
    ag=(ag*(period-1)+g)/period;
    al=(al*(period-1)+l)/period;
    out.push(al===0?100:100-100/(1+ag/al));
  }
  return out;
}

function drawCandles(id, candles, opts={}) {
  const canvas=document.getElementById(id);
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.clientWidth||canvas.width;
  const H=canvas.clientHeight||canvas.height;
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const PL=opts.padL||42,PR=opts.padR||18,PT=opts.padT||18,PB=opts.padB||36;
  ctx.fillStyle='#070d1a';
  ctx.fillRect(0,0,W,H);

  const prices=candles.flatMap(c=>[c.h,c.l]);
  let mn=Math.min(...prices), mx=Math.max(...prices);
  const rng=mx-mn; mn-=rng*.06; mx+=rng*.06;
  const cW=Math.max(3,(W-PL-PR)/candles.length*.65);
  const gap=(W-PL-PR)/candles.length;
  const toY=p=>PT+(mx-p)/(mx-mn)*(H-PT-PB);

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){
    const y=PT+(H-PT-PB)*i/5;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
    const pv=mx-(mx-mn)*i/5;
    ctx.fillStyle='#64748b';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText(pv.toFixed(1),PL-4,y+3);
  }

  // volume bars
  if(opts.volume){
    const maxV=Math.max(...candles.map(c=>c.v));
    candles.forEach((c,i)=>{
      const x=PL+i*gap+gap/2;
      const bh=(c.v/maxV)*(H-PT-PB)*0.2;
      ctx.fillStyle=c.c>=c.o?'rgba(38,166,154,0.25)':'rgba(239,83,80,0.25)';
      ctx.fillRect(x-cW/2,H-PB-bh,cW,bh);
    });
  }

  // moving averages
  if(opts.ma){
    opts.ma.forEach(({vals,color})=>{
      ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.setLineDash([]);
      ctx.beginPath();let started=false;
      vals.forEach((v,i)=>{
        if(v===null)return;
        const x=PL+i*gap+gap/2,y=toY(v);
        if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
      });
      ctx.stroke();
    });
  }

  // bollinger bands
  if(opts.bb){
    const {upper,middle,lower}=opts.bb;
    [[upper,'rgba(59,130,246,0.5)'],[middle,'rgba(59,130,246,0.8)'],[lower,'rgba(59,130,246,0.5)']].forEach(([vals,color])=>{
      ctx.strokeStyle=color;ctx.lineWidth=1;ctx.setLineDash([]);
      ctx.beginPath();let s=false;
      vals.forEach((v,i)=>{
        if(v===null)return;
        const x=PL+i*gap+gap/2,y=toY(v);
        if(!s){ctx.moveTo(x,y);s=true;}else ctx.lineTo(x,y);
      });
      ctx.stroke();
    });
  }

  // candles
  candles.forEach((c,i)=>{
    const x=PL+i*gap+gap/2;
    const bull=c.c>=c.o;
    const col=bull?'#26a69a':'#ef5350';
    ctx.strokeStyle=col;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,toY(c.h));ctx.lineTo(x,toY(c.l));ctx.stroke();
    const bT=Math.min(toY(c.o),toY(c.c)),bH=Math.max(Math.abs(toY(c.c)-toY(c.o)),1.5);
    ctx.fillStyle=col;
    ctx.fillRect(x-cW/2,bT,cW,bH);
  });

  // S/R lines
  if(opts.sr){
    opts.sr.forEach(({price,type,lbl})=>{
      const y=toY(price);
      ctx.strokeStyle=type==='s'?'rgba(16,185,129,0.8)':'rgba(239,68,68,0.8)';
      ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=type==='s'?'#10b981':'#ef4444';
      ctx.font='bold 10px monospace';ctx.textAlign='left';
      ctx.fillText(lbl,W-PR+2,y+3);
    });
  }

  // pattern labels
  if(opts.labels){
    opts.labels.forEach(({i,txt,color})=>{
      const x=PL+i*gap+gap/2;
      ctx.fillStyle=color||'#f59e0b';
      ctx.font='bold 10px sans-serif';ctx.textAlign='center';
      ctx.fillText(txt,x,PT-4);
    });
  }

  // arrow markers
  if(opts.arrows){
    opts.arrows.forEach(({i,dir,color})=>{
      const c=candles[i];
      const x=PL+i*gap+gap/2;
      ctx.fillStyle=color||(dir==='up'?'#10b981':'#ef4444');
      ctx.beginPath();
      if(dir==='up'){
        const y=toY(c.l)-8;
        ctx.moveTo(x,y);ctx.lineTo(x-5,y+8);ctx.lineTo(x+5,y+8);
      } else {
        const y=toY(c.h)+8;
        ctx.moveTo(x,y);ctx.lineTo(x-5,y-8);ctx.lineTo(x+5,y-8);
      }
      ctx.fill();
    });
  }

  // trendline
  if(opts.trendlines){
    opts.trendlines.forEach(({i1,p1,i2,p2,color})=>{
      ctx.strokeStyle=color||'rgba(245,158,11,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();
      ctx.moveTo(PL+i1*gap+gap/2,toY(p1));
      ctx.lineTo(PL+i2*gap+gap/2,toY(p2));
      ctx.stroke();ctx.setLineDash([]);
    });
  }
}

function drawPayoff(id,strategy,params={}) {
  const canvas=document.getElementById(id);
  if(!canvas) return;
  const W=canvas.clientWidth||400, H=180;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#070d1a';ctx.fillRect(0,0,W,H);

  const {strike=100,premium=5,strike2=110,premium2=3,spot=100}=params;
  const PL=35,PR=15,PT=15,PB=28;
  const cW=W-PL-PR, cH=H-PT-PB;

  const prices=Array.from({length:100},(_,i)=>strike-20+i*0.4);
  let pnl;
  switch(strategy){
    case 'long_call': pnl=prices.map(p=>Math.max(0,p-strike)-premium); break;
    case 'long_put': pnl=prices.map(p=>Math.max(0,strike-p)-premium); break;
    case 'covered_call': pnl=prices.map(p=>(p-spot)+Math.min(0,strike-p)+premium2); break;
    case 'bull_call_spread': pnl=prices.map(p=>Math.max(0,p-strike)-premium-Math.max(0,p-strike2)+premium2); break;
    case 'bear_put_spread': pnl=prices.map(p=>Math.max(0,strike2-p)-premium-Math.max(0,strike-p)+premium2); break;
    case 'iron_condor': {
      const s1=strike-15,s2=strike-5,s3=strike+5,s4=strike+15,np=2;
      pnl=prices.map(p=>np-Math.max(0,s2-p)+Math.max(0,s1-p)-Math.max(0,p-s3)+Math.max(0,p-s4));
      break;
    }
    case 'straddle': pnl=prices.map(p=>Math.max(0,p-strike)+Math.max(0,strike-p)-premium*2); break;
    case 'strangle': pnl=prices.map(p=>Math.max(0,p-strike2)+Math.max(0,strike-p)-premium-premium2); break;
    case 'protective_put': pnl=prices.map(p=>(p-spot)+Math.max(0,strike-p)-premium); break;
    default: pnl=prices.map(p=>Math.max(0,p-strike)-premium);
  }

  const mn=Math.min(...pnl), mx=Math.max(...pnl);
  const rng=Math.max(mx-mn,1);
  const toY=v=>PT+cH-(v-mn)/rng*cH;
  const toX=i=>PL+i/prices.length*cW;

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=PT+cH*i/4;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
  }

  // zero line
  const zy=toY(0);
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(PL,zy);ctx.lineTo(W-PR,zy);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#64748b';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText('0',PL-3,zy+3);

  // fill area
  ctx.beginPath();
  ctx.moveTo(toX(0),zy);
  pnl.forEach((_,i)=>ctx.lineTo(toX(i),toY(pnl[i])));
  ctx.lineTo(toX(pnl.length-1),zy);
  ctx.closePath();
  const grad=ctx.createLinearGradient(0,PT,0,PT+cH);
  grad.addColorStop(0,'rgba(16,185,129,0.3)');
  grad.addColorStop(1,'rgba(239,68,68,0.3)');
  ctx.fillStyle=grad;ctx.fill();

  // payoff line
  ctx.beginPath();
  pnl.forEach((v,i)=>{
    if(i===0) ctx.moveTo(toX(i),toY(v));
    else ctx.lineTo(toX(i),toY(v));
  });
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.stroke();

  // labels
  ctx.fillStyle='#94a3b8';ctx.font='9px monospace';
  ctx.textAlign='center';
  ctx.fillText('Price →',PL+cW/2,H-4);
  ctx.textAlign='right';
  ctx.fillText(mn.toFixed(0),PL-3,H-PB+4);
  ctx.fillText(mx.toFixed(0),PL-3,PT+8);
}

function drawGreek(id,greek) {
  const canvas=document.getElementById(id);
  if(!canvas) return;
  const W=canvas.clientWidth||360, H=160;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#070d1a';ctx.fillRect(0,0,W,H);

  const PL=30,PR=15,PT=15,PB=25;
  const cW=W-PL-PR, cH=H-PT-PB;
  const xs=Array.from({length:100},(_,i)=>i/99);
  let vals,color,lbl;

  switch(greek){
    case 'delta_call': vals=xs.map(x=>1/(1+Math.exp(-10*(x-.5)))); color='#3b82f6'; lbl='Delta (Call)'; break;
    case 'delta_put': vals=xs.map(x=>1/(1+Math.exp(-10*(x-.5)))-1); color='#ef4444'; lbl='Delta (Put)'; break;
    case 'gamma': vals=xs.map(x=>Math.exp(-Math.pow(x-.5,2)/0.02)*0.4); color='#8b5cf6'; lbl='Gamma'; break;
    case 'theta': vals=xs.map(x=>-Math.exp(-Math.pow(x-1,2)/0.3)*5); color='#ef4444'; lbl='Theta (time decay)'; break;
    case 'vega': vals=xs.map(x=>Math.exp(-Math.pow(x-.5,2)/0.025)*3); color='#06b6d4'; lbl='Vega'; break;
    default: vals=xs.map(x=>x); color='#10b981'; lbl='Value';
  }

  const mn=Math.min(...vals), mx=Math.max(...vals);
  const rng=Math.max(mx-mn,.01);
  const toY=v=>PT+cH-(v-mn)/rng*cH;

  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    ctx.beginPath();ctx.moveTo(PL,PT+cH*i/4);ctx.lineTo(W-PR,PT+cH*i/4);ctx.stroke();
  }

  // zero line
  if(mn<0&&mx>0){
    const zy=toY(0);
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(PL,zy);ctx.lineTo(W-PR,zy);ctx.stroke();ctx.setLineDash([]);
  }

  // area fill
  const zy=toY(0);
  ctx.beginPath();ctx.moveTo(PL,zy);
  xs.forEach((_,i)=>ctx.lineTo(PL+i/99*cW,toY(vals[i])));
  ctx.lineTo(PL+cW,zy);ctx.closePath();
  ctx.fillStyle=color.replace(')',',0.15)').replace('rgb','rgba').replace('#','').length>9?color+'28':color+'28';
  // simpler fill
  const grad=ctx.createLinearGradient(0,PT,0,PT+cH);
  grad.addColorStop(0,color+'55');grad.addColorStop(1,color+'11');
  ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();
  xs.forEach((_,i)=>{
    const x2=PL+i/99*cW, y2=toY(vals[i]);
    if(i===0)ctx.moveTo(x2,y2); else ctx.lineTo(x2,y2);
  });
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([]);ctx.stroke();

  ctx.fillStyle='#94a3b8';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText(lbl,PL+cW/2,H-5);
}

function drawMACD(id, candles) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const W = canvas.clientWidth || 400, H = 120;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#070d1a'; ctx.fillRect(0, 0, W, H);

  const PL = 35, PR = 10, PT = 10, PB = 20;
  const cW = W - PL - PR, cH = H - PT - PB;

  const ema12 = calcEMA(candles, 12);
  const ema26 = calcEMA(candles, 26);
  const macdLine = ema12.map((v, i) => (v !== null && ema26[i] !== null) ? v - ema26[i] : null);
  const signalLine = (() => {
    const valid = macdLine.map((v, i) => ({ v, i })).filter(x => x.v !== null);
    const out = Array(macdLine.length).fill(null);
    if (valid.length < 9) return out;
    let ema = valid.slice(0, 9).reduce((s, x) => s + x.v, 0) / 9;
    out[valid[8].i] = ema;
    const k = 2 / 10;
    for (let j = 9; j < valid.length; j++) {
      ema = valid[j].v * k + ema * (1 - k);
      out[valid[j].i] = ema;
    }
    return out;
  })();

  const hist = macdLine.map((v, i) => (v !== null && signalLine[i] !== null) ? v - signalLine[i] : null);
  const allVals = [...macdLine, ...signalLine, ...hist].filter(v => v !== null);
  const mn = Math.min(...allVals), mx = Math.max(...allVals);
  const rng = Math.max(mx - mn, 0.01);
  const toY = v => PT + cH - (v - mn) / rng * cH;
  const toX = i => PL + i / candles.length * cW;
  const bW = Math.max(1, cW / candles.length * 0.6);

  // zero line
  const zy = toY(0);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(PL, zy); ctx.lineTo(W - PR, zy); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = '#64748b'; ctx.font = '9px monospace'; ctx.textAlign = 'right'; ctx.fillText('0', PL - 3, zy + 3);

  // histogram
  hist.forEach((v, i) => {
    if (v === null) return;
    const x = toX(i), y = toY(v);
    ctx.fillStyle = v >= 0 ? 'rgba(38,166,154,0.6)' : 'rgba(239,83,80,0.6)';
    ctx.fillRect(x - bW / 2, Math.min(y, zy), bW, Math.abs(y - zy));
  });

  // MACD & signal lines
  [[macdLine, '#3b82f6', 1.5], [signalLine, '#ef4444', 1.5]].forEach(([vals, color, lw]) => {
    ctx.beginPath(); let s = false;
    vals.forEach((v, i) => {
      if (v === null) return;
      const x = toX(i), y = toY(v);
      if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.setLineDash([]); ctx.stroke();
  });

  ctx.fillStyle = '#64748b'; ctx.font = '9px monospace'; ctx.textAlign = 'left'; ctx.fillText('MACD', PL + 4, PT + 10);
}

function drawPatternDemo(id, groups) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth || 600;
  const H = canvas.clientHeight || 180;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = '#070d1a'; ctx.fillRect(0, 0, W, H);

  const n = groups.length;
  const slotW = W / n;

  groups.forEach((group, gi) => {
    const candles = group.candles;
    const x0 = gi * slotW + 8, x1 = (gi + 1) * slotW - 8;
    const sw = x1 - x0;
    const PT = 24, PB = 36, cH = H - PT - PB;

    const prices = candles.flatMap(c => [c.h, c.l]);
    let mn = Math.min(...prices), mx = Math.max(...prices);
    const rng = mx - mn || 1;
    mn -= rng * 0.1; mx += rng * 0.1;
    const toY = p => PT + (mx - p) / (mx - mn) * cH;
    const gap = sw / (candles.length || 1);
    const cW = Math.max(5, gap * 0.58);

    if (gi > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(gi * slotW, 5); ctx.lineTo(gi * slotW, H - 5); ctx.stroke();
    }

    candles.forEach((c, ci) => {
      const cx = x0 + ci * gap + gap / 2;
      const bull = c.c >= c.o;
      const col = bull ? '#26a69a' : '#ef5350';
      ctx.strokeStyle = col; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(cx, toY(c.h)); ctx.lineTo(cx, toY(c.l)); ctx.stroke();
      const bT = Math.min(toY(c.o), toY(c.c));
      const bH = Math.max(Math.abs(toY(c.c) - toY(c.o)), 2.5);
      ctx.fillStyle = col;
      ctx.fillRect(cx - cW / 2, bT, cW, bH);
    });

    const tc = group.bullish ? '#10b981' : '#ef4444';
    ctx.fillStyle = tc + '22';
    ctx.fillRect(x0, H - PB + 4, sw, PB - 6);
    ctx.fillStyle = tc; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(group.bullish ? '▲ ' + group.name : '▼ ' + group.name, x0 + sw / 2, H - 6);
  });
}

function calcBB(candles, period=20, mult=2) {
  return candles.map((_,i)=>{
    if(i<period-1) return {upper:null,middle:null,lower:null};
    const sl=candles.slice(i-period+1,i+1);
    const mean=sl.reduce((s,c)=>s+c.c,0)/period;
    const std=Math.sqrt(sl.reduce((s,c)=>s+Math.pow(c.c-mean,2),0)/period);
    return {upper:mean+mult*std, middle:mean, lower:mean-mult*std};
  });
}

  ctx.lineTo(toX(data.length-1),toY(0));ctx.lineTo(toX(0),toY(0));ctx.closePath();
  ctx.fillStyle='rgba(239,68,68,0.1)';ctx.fill();
  ctx.beginPath();data.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));
  ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.setLineDash([]);ctx.stroke();
  data.forEach((v,i)=>{ctx.fillStyle=v>30?'#ef4444':v>15?'#f59e0b':'#10b981';ctx.beginPath();ctx.arc(toX(i),toY(v),3,0,Math.PI*2);ctx.fill();});
  (labels||[]).forEach((lbl,i)=>{ctx.fillStyle='#64748b';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(lbl,toX(i),H-4);});
}

   APP STATE & LOGIC

let curMod = 0;
let curSlide = 0;
let eli10On = false;
let progress = JSON.parse(localStorage.getItem('tda_progress') || '{}');
// progress[modId] = { slides: Set, quizDone: bool, score: n }

function saveProgress() {
  const s = {};
  for (const [k, v] of Object.entries(progress)) {
    s[k] = { slides: [...(v.slides||[])], quizDone: v.quizDone, score: v.score };
  }
  localStorage.setItem('tda_progress', JSON.stringify(s));
}

function loadProgress() {
  const raw = JSON.parse(localStorage.getItem('tda_progress') || '{}');
  for (const [k, v] of Object.entries(raw)) {
    progress[k] = { slides: new Set(v.slides||[]), quizDone: v.quizDone||false, score: v.score||0 };
  }
}

function markSlide(modId, slideIdx) {
  if (!progress[modId]) progress[modId] = { slides: new Set(), quizDone: false, score: 0 };
  progress[modId].slides.add(slideIdx);
  saveProgress();
}

function isModDone(mod) {
  const p = progress[mod.id];
  if (!p) return false;
  return p.quizDone || (p.slides && p.slides.size >= mod.slides.length);
}

function getOverallPct() {
  const done = MODULES.filter(m => isModDone(m)).length;
  return Math.round(done / MODULES.length * 100);
}

/* ── SIDEBAR ── */
function buildSidebar() {
  const list = document.getElementById('mod-list');
  list.innerHTML = MODULES.map((m, i) => {
    const done = isModDone(m);
    const active = i === curMod;
    const isPlaceholder = m.slides[0]?.title === 'Coming Soon';
    return `<div class="mi ${active?'active':''} ${done?'done':''} ${isPlaceholder&&!active?'locked':''}"
      onclick="gotoMod(${i})" id="mi_${i}">
      <span class="mi-icon">${m.icon}</span>
      <div class="mi-info">
        <div class="mi-title">Module ${m.id}: ${m.title}</div>
        <div class="mi-sub">${m.slides.length} slides${m.quiz.length?' • '+m.quiz.length+' Q quiz':''}</div>
      </div>
      <span class="mi-badge">${done?'✅':isPlaceholder?'🔒':''}</span>
    </div>`;
  }).join('');
  document.getElementById('main-pbar').style.width = getOverallPct() + '%';
  document.getElementById('pct-lbl').textContent = getOverallPct() + '%';
}

function gotoMod(idx) {
  curMod = idx;
  curSlide = 0;
  eli10On = false;
  document.getElementById('eli10-btn').classList.remove('on');
  renderSlide();
  buildSidebar();
}

/* ── SLIDE RENDER ── */
function renderSlide() {
  const mod = MODULES[curMod];
  const slide = mod.slides[curSlide];

  // topbar
  document.getElementById('mod-title').textContent = `Module ${mod.id}: ${mod.title}`;
  document.getElementById('mod-sub').textContent = slide.sub || '';
  document.getElementById('slide-info').textContent = `${curSlide+1} / ${mod.slides.length}`;

  // content
  const area = document.getElementById('slide-area');
  area.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.className = 'slide';

  const titleEl = document.createElement('div');
  titleEl.className = 'slide-title';
  titleEl.textContent = slide.title;
  wrapper.appendChild(titleEl);

  if (slide.sub) {
    const subEl = document.createElement('div');
    subEl.className = 'slide-sub';
    subEl.textContent = slide.sub;
    wrapper.appendChild(subEl);
  }

  // ELI10 box
  if (slide.eli10) {
    const eli = document.createElement('div');
    eli.className = 'eli10' + (eli10On ? ' show' : '');
    eli.id = 'eli10-box';
    eli.innerHTML = `<div class="lbl">🧒 Explain Like I'm 10</div><p>${slide.eli10}</p>`;
    wrapper.appendChild(eli);
  }

  // main content
  const content = document.createElement('div');
  slide.render(content);
  wrapper.appendChild(content);

  area.appendChild(wrapper);

  // mark slide as viewed
  markSlide(mod.id, curSlide);

  // dots
  buildDots(mod);

  // nav buttons
  document.getElementById('prev-btn').disabled = curSlide === 0 && curMod === 0;
  document.getElementById('prev-btn').textContent = curSlide === 0 && curMod > 0 ? '← Prev Module' : '← Prev';

  const nextBtn = document.getElementById('next-btn');
  const isLastSlide = curSlide === mod.slides.length - 1;
  if (isLastSlide && mod.quiz.length > 0) {
    nextBtn.textContent = '📝 Take Quiz';
    nextBtn.className = 'nbtn quiz';
    nextBtn.onclick = openQuiz;
  } else if (isLastSlide) {
    nextBtn.textContent = 'Next Module →';
    nextBtn.className = 'nbtn primary';
    nextBtn.onclick = () => nav(1);
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'nbtn primary';
    nextBtn.onclick = () => nav(1);
  }

  // render charts if any (needs a tick to let DOM settle)
  if (slide.charts) {
    setTimeout(() => {
      slide.charts.forEach(fn => fn());
    }, 50);
  }
}

function buildDots(mod) {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = mod.slides.map((_, i) => {
    const p = progress[mod.id];
    const done = p && p.slides && p.slides.has(i);
    return `<div class="dot ${i===curSlide?'on':done?'done':''}" onclick="goSlide(${i})"></div>`;
  }).join('');
}

function goSlide(i) {
  curSlide = i;
  renderSlide();
}

function nav(dir) {
  const mod = MODULES[curMod];
  if (dir === 1) {
    if (curSlide < mod.slides.length - 1) {
      curSlide++;
      renderSlide();
    } else {
      // move to next module
      if (curMod < MODULES.length - 1) {
        curMod++;
        curSlide = 0;
        renderSlide();
        buildSidebar();
      }
    }
  } else {
    if (curSlide > 0) {
      curSlide--;
      renderSlide();
    } else if (curMod > 0) {
      curMod--;
      curSlide = MODULES[curMod].slides.length - 1;
      renderSlide();
      buildSidebar();
    }
  }
}

function toggleEli10() {
  eli10On = !eli10On;
  document.getElementById('eli10-btn').classList.toggle('on', eli10On);
  const box = document.getElementById('eli10-box');
  if (box) box.classList.toggle('show', eli10On);
}

  document.getElementById('q-meta').textContent = `${mod.quiz.length} questions — Test your understanding of ${mod.title}`;

  const body = document.getElementById('q-body');
  body.innerHTML = mod.quiz.map((q, qi) => `
    <div class="qq" id="qq_${qi}">
      <div class="qt">${qi+1}. ${q.q}</div>
      ${q.opts.map((opt, oi) => `
        <div class="qopt" id="qopt_${qi}_${oi}" onclick="selectOpt(${qi},${oi})">
          <div class="ql">${String.fromCharCode(65+oi)}</div>
          <span>${opt}</span>
        </div>
      `).join('')}
      <div class="q-explain" id="qexp_${qi}">💡 ${q.exp}</div>
    </div>
  `).join('');

  document.getElementById('qactions').innerHTML = `
    <button class="qbtn s" onclick="closeQuiz()">Cancel</button>
    <button class="qbtn p" onclick="submitQuiz()">Submit Answers</button>
  `;

  document.getElementById('qoverlay').classList.add('open');
}

function selectOpt(qi, oi) {
  if (quizSubmitted) return;
  quizAnswers[qi] = oi;
  const mod = MODULES[curMod];
  for (let j = 0; j < mod.quiz[qi].opts.length; j++) {
    const el = document.getElementById(`qopt_${qi}_${j}`);
    el.classList.toggle('sel', j === oi);
  }
}

function submitQuiz() {
  const mod = MODULES[curMod];
  if (Object.keys(quizAnswers).length < mod.quiz.length) {
    alert('Please answer all questions before submitting!');
    return;
  }
  quizSubmitted = true;
  let score = 0;
  mod.quiz.forEach((q, qi) => {
    const chosen = quizAnswers[qi];
    const correct = q.ans;
    for (let j = 0; j < q.opts.length; j++) {
      const el = document.getElementById(`qopt_${qi}_${j}`);
      el.classList.remove('sel');
      if (j === correct) el.classList.add('correct');
      else if (j === chosen && chosen !== correct) el.classList.add('wrong');
    }
    if (chosen === correct) score++;
    document.getElementById(`qexp_${qi}`).classList.add('show');
  });

  // save
  if (!progress[mod.id]) progress[mod.id] = { slides: new Set(), quizDone: false, score: 0 };
  progress[mod.id].quizDone = true;
  progress[mod.id].score = score;
  saveProgress();
  buildSidebar();

  const pct = Math.round(score / mod.quiz.length * 100);
  const pass = pct >= 60;
  document.getElementById('qactions').innerHTML = `
    <div id="qresult">
      <div class="score-ring ${pass?'':'fail'}">
        <div class="snum">${score}/${mod.quiz.length}</div>
        <div class="slbl">${pct}%</div>
      </div>
      <h3>${pass ? '🎉 Well Done!' : '📚 Keep Studying'}</h3>
      <p>${pass
        ? `You scored ${pct}% — great understanding of ${mod.title}! Ready to move on.`
        : `You scored ${pct}%. Review the module slides again and try once more. Check the explanations above!`
      }</p>
      <div style="display:flex;gap:10px;justify-content:center">
        ${!pass ? `<button class="qbtn s" onclick="retryQuiz()">🔄 Retry Quiz</button>` : ''}
        <button class="qbtn p" onclick="closeQuiz()">Continue →</button>
      </div>
    </div>
  `;
}

function retryQuiz() {
  document.getElementById('qoverlay').classList.remove('open');
  setTimeout(openQuiz, 200);
}

function closeQuiz() {
  document.getElementById('qoverlay').classList.remove('open');
  // if quiz done, go to next module
  const mod = MODULES[curMod];
  if (progress[mod.id]?.quizDone && curMod < MODULES.length - 1) {
    setTimeout(() => {
      curMod++;
      curSlide = 0;
      renderSlide();
      buildSidebar();
    }, 300);
  }
}

/* ── POSITION SIZING CALCULATOR ── */
function calcPosition() {
  const acct  = parseFloat(document.getElementById('c-acct')?.value)  || 10000;
  const riskP = parseFloat(document.getElementById('c-risk')?.value)  || 1;
  const entry = parseFloat(document.getElementById('c-entry')?.value) || 100;
  const stop  = parseFloat(document.getElementById('c-stop')?.value)  || 97;
  const rr    = parseFloat(document.getElementById('c-rr')?.value)    || 2;
  const res   = document.getElementById('c-results');
  if (!res) return;

  const dollarRisk = acct * riskP / 100;
  const dist = Math.abs(entry - stop);
  if (dist <= 0) { res.innerHTML='<p style="color:var(--red)">Stop must differ from entry.</p>'; return; }
  const shares   = Math.floor(dollarRisk / dist);
  const posVal   = shares * entry;
  const posPct   = posVal / acct * 100;
  const bull     = entry > stop;
  const tp2r     = bull ? entry + dist * rr   : entry - dist * rr;
  const tp3r     = bull ? entry + dist * rr * 1.5 : entry - dist * rr * 1.5;
  const maxGain  = shares * dist * rr;
  const maxLoss  = shares * dist;
  const bePct    = (1 / (1 + rr) * 100).toFixed(1);

  res.innerHTML = `
  <div class="g3" style="margin-top:14px">
    <div class="ibox ${riskP<=1?'g':'y'}">
      <h4>Max Dollar Risk</h4>
      <p style="font-size:22px;font-weight:800;color:var(--red)">−$${maxLoss.toFixed(2)}</p>
      <p style="font-size:11px">${riskP}% of $${acct.toLocaleString()}</p>
    </div>
    <div class="ibox g">
      <h4>Shares to Trade</h4>
      <p style="font-size:22px;font-weight:800;color:var(--grn)">${shares.toLocaleString()}</p>
      <p style="font-size:11px">$${posVal.toFixed(0)} position · ${posPct.toFixed(1)}% of account</p>
    </div>
    <div class="ibox">
      <h4>Price Targets</h4>
      <p style="font-size:12px">2R (${rr}:1)&nbsp; <strong style="color:var(--grn)">$${tp2r.toFixed(2)}</strong> → +$${maxGain.toFixed(0)}</p>
      <p style="font-size:12px">3R&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <strong style="color:var(--grn)">$${tp3r.toFixed(2)}</strong></p>
      <p style="font-size:11px;color:var(--t3)">Break-even win rate: ${bePct}%</p>
    </div>
  </div>
  <div class="formula" style="margin-top:10px;font-size:11px">
    Shares = $${dollarRisk.toFixed(0)} risk ÷ $${dist.toFixed(2)} stop distance = ${shares} shares
  </div>`;
}
